# Fly.io deploy config. Fly builds from your LOCAL directory, so the prebuilt
# storage/ (vector store + PYQ links) is included automatically.
#
#   fly launch --no-deploy --copy-config --name <your-app-name>   # first time
#   fly secrets set OPENAI_API_KEY=sk-...                          # set the key
#   fly deploy
#
# Change `app` to a unique name (Fly app names are global).
app = "gateoverflow-chatbot"
primary_region = "sin"          # Singapore (close to India); pick your nearest

[build]
  dockerfile = "Dockerfile.prod"

[env]
  CHAT_MODEL = "gpt-4o-mini"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true     # scale to zero when idle (saves cost)
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024              # bump to 2048 if memory is tight with Chroma
