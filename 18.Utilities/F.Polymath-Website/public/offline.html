<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · Polymath</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #0b0f1a; color: #e5e7eb; text-align: center; padding: 2rem;
        background-image:
          radial-gradient(40rem 40rem at 10% -10%, rgba(99,102,241,.25), transparent 60%),
          radial-gradient(35rem 35rem at 90% 0%, rgba(236,72,153,.18), transparent 55%);
      }
      .logo { width: 64px; height: 64px; border-radius: 16px; display: grid; place-items: center;
        background: linear-gradient(135deg, #6366f1, #ec4899); color: #fff; font: 700 38px Georgia, serif; margin: 0 auto 1.25rem; }
      h1 { font-size: 1.6rem; margin: 0 0 .5rem; }
      p { color: #9ca3af; max-width: 30rem; line-height: 1.6; margin: 0 auto 1.5rem; }
      a.btn { display: inline-block; background: #4f46e5; color: #fff; text-decoration: none;
        padding: .7rem 1.4rem; border-radius: .8rem; font-weight: 600; }
      a.btn:hover { background: #4338ca; }
    </style>
  </head>
  <body>
    <div>
      <div class="logo">P</div>
      <h1>You're offline 🦉</h1>
      <p>This page isn't cached yet. Articles you've already opened are available offline — and everything comes back the moment you reconnect.</p>
      <a class="btn" href="/" onclick="location.reload()">Try again</a>
    </div>
  </body>
</html>
